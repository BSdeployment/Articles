# Site settings
title: Bs DotNet
description: "Exploring technology, artificial intelligence, cybersecurity, and modern software development."
url: "https://bsdeployment.github.io"
baseurl: "/Articles"

# Author
author:
  name: "Bs DotNet"
  bio: "Software developer and technology enthusiast."

# Social
github_username: https://github.com/BSdeployment
twitter_username: bs_dotnet
linkedin_username: bs-dotnet

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Theme (uncomment to use Minimal Mistakes)
# remote_theme: mmistakes/minimal-mistakes

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Collections
collections:
  posts:
    output: true
    permalink: /articles/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "article"
      author: "Your Name"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
